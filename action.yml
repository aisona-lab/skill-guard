name: skill-guard
description: Audit Agent Skill packages (SKILL.md) for secrets, exfil, shell bombs, and enterprise policy risks.
author: aisona-lab
branding:
  icon: shield
  color: red

inputs:
  path:
    description: Path to skill directory (or multiple space-separated paths)
    required: true
    default: .
  fail-on:
    description: never | warn | block
    required: false
    default: block
  sarif:
    description: Write SARIF report to this path (empty to skip)
    required: false
    default: skill-guard.sarif

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install skill-guard
      shell: bash
      run: pip install "${{ github.action_path }}"
    - name: Scan
      shell: bash
      run: |
        set -euo pipefail
        # shellcheck disable=SC2206
        PATHS=(${{ inputs.path }})
        ARGS=(scan "${PATHS[@]}" --fail-on "${{ inputs.fail-on }}")
        if [ -n "${{ inputs.sarif }}" ]; then
          ARGS+=(--sarif-file "${{ inputs.sarif }}")
        fi
        skill-guard "${ARGS[@]}"
