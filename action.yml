name: skill-guard
description: Audit Agent Skill packages (SKILL.md) for secrets, exfil, shell bombs, and enterprise policy risks.
author: aisona-lab
branding:
  icon: shield
  color: red

inputs:
  path:
    description: >
      One skill path, or multiple paths separated by newlines (not spaces).
      Paths may contain spaces. Prefer a YAML block scalar for multi-path:

        path: |
          ./skills/foo
          ./skills/bar with spaces
    required: true
    default: .
  fail-on:
    description: never | warn | block
    required: false
    default: block
  sarif:
    description: Write SARIF report to this path (empty to skip)
    required: false
    default: skill-guard.sarif

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install skill-guard
      shell: bash
      run: pip install "${{ github.action_path }}"
    - name: Scan
      shell: bash
      env:
        # Preserve newlines / spaces; never word-split inputs.path
        SKILL_GUARD_PATHS: ${{ inputs.path }}
        SKILL_GUARD_FAIL_ON: ${{ inputs.fail-on }}
        SKILL_GUARD_SARIF: ${{ inputs.sarif }}
      run: |
        set -euo pipefail

        PATHS=()
        while IFS= read -r line || [[ -n "${line:-}" ]]; do
          # trim leading/trailing whitespace only
          line="${line#"${line%%[![:space:]]*}"}"
          line="${line%"${line##*[![:space:]]}"}"
          [[ -z "$line" ]] && continue
          PATHS+=("$line")
        done <<< "$SKILL_GUARD_PATHS"

        if [[ ${#PATHS[@]} -eq 0 ]]; then
          echo "error: no skill paths provided in inputs.path" >&2
          exit 3
        fi

        ARGS=(scan "${PATHS[@]}" --fail-on "$SKILL_GUARD_FAIL_ON")
        if [[ -n "${SKILL_GUARD_SARIF}" ]]; then
          ARGS+=(--sarif-file "$SKILL_GUARD_SARIF")
        fi
        skill-guard "${ARGS[@]}"
